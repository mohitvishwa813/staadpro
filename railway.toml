[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# Intentionally no startCommand here — the Dockerfile CMD handles startup
# from the correct WORKDIR (/app/staad_procurement). Setting startCommand
# here would override CMD and run from /, breaking the import path.
[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
